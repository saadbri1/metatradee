# Supabase CLI project configuration.
# Only auth-relevant settings for Phase 9.2 are pinned here; everything else
# uses CLI defaults. See https://supabase.com/docs/guides/cli/config.
project_id = "metatradee"

[auth]
# Base site URL used to build confirmation / recovery links.
site_url = "http://localhost:3000"
# Allowlist of post-auth redirect targets (server also re-validates, see
# src/features/auth/lib/redirect.ts). Add production origins on deploy.
additional_redirect_urls = ["http://localhost:3000/auth/callback", "http://localhost:3000/auth/confirm"]
# Email confirmation is REQUIRED before sensitive actions (Phase 9.2 FRS).
enable_confirmations = true
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
