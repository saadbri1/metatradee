version: 2
updates:
  # Application dependencies (pnpm / npm registry).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch low-risk minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by CI/E2E workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
